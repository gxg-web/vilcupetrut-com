<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Petruț Vîlcu — Romanian Security Systems. Visible deterrence, rapid response, total control." />
    <title>Petruț Vîlcu · Romanian Security Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <main class="shell">
      <header class="brand-bar">
        <span class="brand-bar__tag" data-glitch>RSS</span>
        <span class="brand-bar__line"></span>
        <span class="brand-bar__status">SECURE CHANNEL</span>
      </header>

      <div class="layout">
        <section class="panel" aria-labelledby="profile-heading">
          <div class="panel__corners" aria-hidden="true"></div>
          <p class="panel__eyebrow">
            <span class="blink">▸</span> CLASSIFIED PROFILE · LEVEL 1
          </p>
  <h1 id="profile-heading" class="panel__name" data-decode>Petruț Vîlcu</h1>
          <p class="panel__role">Romanian Security Systems</p>

          <p class="panel__motto">
            “Visible deterrence. Rapid response. Total control.”
          </p>

          <p id="local-file-hint" class="local-file-hint" hidden></p>

          <ul class="panel__meta">
            <li>
              <span class="meta__label">Phone</span>
              <a class="meta__value" href="tel:+40727111222">0727 111 222</a>
            </li>
            <li>
              <span class="meta__label">Email</span>
              <a class="meta__value" href="mailto:asd@asd.asd">asd@asd.asd</a>
            </li>
          </ul>

          <div class="panel__footer">
            <span class="ticker" data-ticker></span>
          </div>
        </section>

        <section class="visual" aria-label="Portrait">
          <div class="visual__frame">
            <div class="visual__grid" aria-hidden="true"></div>
            <video
              id="hero-video"
              class="visual__video"
              playsinline
              muted
              preload="auto"
              autoplay
            >
              <source src="assets/petrut.mp4" type="video/mp4" />
            </video>
            <img
              id="hero-static"
              class="visual__static"
              src="assets/last-frame.gif"
              alt=""
              width="800"
              height="1000"
              loading="eager"
              decoding="async"
            />
            <div class="visual__overlay" aria-hidden="true"></div>
          </div>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
